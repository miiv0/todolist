<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
</head>

<body>
    <div class="modal" id="folderModal">
        <div class="modalInner">
            <div class="modalHeader">
                <div>Add Folder</div>
                <button id="closeFolderButton">X</button>
            </div>
            <form id="folderForm">
                <div class="titleInfo">Title</div>
                <input type="text" class="input" id="folderInput" placeholder="Folder Name">
                <button type="button" onclick="addFolder()">Add</button>
            </form>
        </div>
    </div>

    <div class="modal" id="projectModal">
        <div class="modalInner">
            <div class="modalHeader">
                <div>Add Project</div>
                <button id="closeProjectButton">X</button>
            </div>
            <form id="projectForm">
                <div class="titleInfo">Title</div>
                <input type="text" class="input" id="projectTitle" placeholder="Project name">
                <div class="titleInfo">Description</div>
                <input type="text" class="input" id="projectDescription" placeholder="Enter description">
                <div class="titleInfo">Folder</div>
                <select class="input" id="projectFolder">
                    <option value="">No folder</option>
                </select>
                <input type="date" class="input" id="projectDate">
                <button type="button" onclick="addProject()">Add</button>
            </form>
        </div>
    </div>

    <div id="sidebar">
        <div id="sidebarTitle">Note Tracker</div>
        <button id="openFolderModal">+ Folder</button>
        <button id="openProjectModal">+ Project</button>
        <ul id="folderList"></ul>
    </div>

    <div id="noteContent">
        <div id="placeholder">Select a project to view it</div>
        <div id="projectView" style="display:none">
            <div id="projectMeta">
                <select id="viewFolderSelect" class="input"></select>
                <h2 id="viewTitle"></h2>
                <p id="viewDescription"></p>
            </div>
            <hr>
            <h3>Tasks</h3>
            <div id="addSubtaskRow">
                <input type="text" id="subtaskInput" placeholder="Add a task...">
                <button type="button" onclick="addSubtask()">Add</button>
            </div>
            <ul id="subtaskList"></ul>
        </div>
    </div>
</body>

</html>
