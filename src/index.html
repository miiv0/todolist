<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Tracker</title>
</head>

<body>
    <div id="container">
        <div>Note Tracker</div>
        <button id="openModal">+ Add task</button>
        <div id="projects"></div>

        <div class="modal" id="modal">
            <div class="modalInner">
                <div class="modalHeader">
                    <div>Add Task</div>
                    <button id="closeModal">X</button>
                </div>
                <form id="taskForm">
                    <div class="titleInfo">Title</div>
                    <input type="text" class="input" placeholder="Enter title" required>
                    <div class="descInfo">Description</div>
                    <input type="text" class="input" placeholder="Enter description" required>
                    <div class="Date">Date</div>
                    <input type="date" class="input" required>
                    <button type="submit">Add</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
