<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
</head>

<body>
    <div class="modal" id="folderModal">
        <div class="modalInner">
            <div class="modalHeader">
                <div>Add Folder</div>
                <button id="closeModal">X</button>
            </div>
            <form id="folderForm">
                <div class="titleInfo">Title</div>
                <input type="text" class="input" placeholder="Folder Name" required>
                <input type="text" class="input" placeholder="Description" required>
                <button type="button" id="addFolderButton">Add</button>
            </form>
        </div>
    </div>
    <div class="modal" id="taskModal">
        <div class="modalInner">
            <div class="modalHeader">
                <div>Add Task</div>
                <button id="closeModal">X</button>
            </div>
            <form id="taskForm">
                <div class="titleInfo">Title</div>
                <input type="text" class="input" placeholder="Enter title" required>
                <div class="descInfo">Description</div>
                <input type="text" class="input" placeholder="Enter description" required>
                <div class="Date">Date</div>
                <input type="date" class="input" required>
                <button type="button" id="addTaskButton">Add</button>
            </form>
        </div>
    </div>
    <div id="sidebar">
        <div>Note Tracker</div>
        <button id="openFolderModal">+ Folder</button>
        <button id="openTaskModal">+ Task</button>
        <div id="content"></div>
    </div>
    <div id="noteContent">
        <div id="noteTitle">test</div>
        <div id="noteDescription">test</div>
    </div>
</body>

</html>
